<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque em Trânsito - Solução Logística Estratégica</title>
    
    <!-- Carregando Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Carregando React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Carregando Babel para processar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Estilos Globais -->
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        @keyframes flow {
            to { stroke-dashoffset: -20; }
        }
        .animate-flow {
            animation: flow 1s linear infinite;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- COMPONENTE LOGO UX (VETORIAL/SVG) ---
        const LogoUX = ({ className }) => (
            <svg 
                viewBox="0 0 280 100" 
                className={className} 
                fill="currentColor" 
                xmlns="http://www.w3.org/2000/svg" 
                aria-label="Logo UX"
                preserveAspectRatio="xMidYMid meet"
            >
                <path d="M0 0 L38 0 L38 62 C38 80 46 84 55 84 C64 84 72 80 72 62 L72 0 L110 0 L110 62 C110 94 85 100 55 100 C25 100 0 94 0 62 Z" />
                <path d="M125 0 L165 0 L180 30 L195 0 L235 0 L200 50 L240 100 L200 100 L180 70 L160 100 L120 100 L160 50 Z" />
                <rect x="245" y="70" width="30" height="30" />
            </svg>
        );

        // --- ÍCONES SVG ---
        const IconBase = ({ children, size = 24, className = "", ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className} 
                {...props}
            >
                {children}
            </svg>
        );

        const Truck = (props) => <IconBase {...props}><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5v8h1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></IconBase>;
        const Package = (props) => <IconBase {...props}><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/></IconBase>;
        const ShoppingCart = (props) => <IconBase {...props}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></IconBase>;
        const Server = (props) => <IconBase {...props}><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></IconBase>;
        const ArrowDown = (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></IconBase>;
        const AlertTriangle = (props) => <IconBase {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
        const Database = (props) => <IconBase {...props}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconBase>;
        const ArrowRight = (props) => <IconBase {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></IconBase>;
        const FileText = (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></IconBase>;
        const MapPin = (props) => <IconBase {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconBase>;
        const TrendingUp = (props) => <IconBase {...props}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 20.72 11.43 22 7 17.57 2.43 16 7"/></IconBase>;
        const ShieldCheck = (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></IconBase>;
        const Zap = (props) => <IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconBase>;
        const Layout = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></IconBase>;
        const Users = (props) => <IconBase {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Globe = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconBase>;
        const BarChart = (props) => <IconBase {...props}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></IconBase>;
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
        const Target = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconBase>;
        const Layers = (props) => <IconBase {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></IconBase>;
        const Box = (props) => <IconBase {...props}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></IconBase>;
        const Anchor = (props) => <IconBase {...props}><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></IconBase>;
        const Info = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></IconBase>;
        const X = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;
        const ArrowLeft = (props) => <IconBase {...props}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconBase>;
        const PanelLeft = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></IconBase>;
        const GitBranch = (props) => <IconBase {...props}><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></IconBase>;

        // Cores e Estilos Base dos Nós do Fluxograma
        const COLORS = {
            transfer: "bg-blue-50 border-blue-600 text-blue-900 shadow-blue-100",
            sale: "bg-emerald-50 border-emerald-600 text-emerald-900 shadow-emerald-100",
            system: "bg-slate-50 border-slate-600 text-slate-900 shadow-slate-200",
            warning: "bg-amber-50 border-amber-500 text-amber-900 dashed-border shadow-amber-100",
            control: "bg-purple-50 border-purple-600 text-purple-900 shadow-purple-100"
        };

        const Node = ({ data, onClick, isSelected }) => {
            const Icon = data.icon;
            let styleClass = COLORS.system;
            if (data.type === 'transfer') styleClass = COLORS.transfer;
            if (data.type === 'sale') styleClass = COLORS.sale;
            if (data.type === 'warning') styleClass = COLORS.warning;
            if (data.type === 'control') styleClass = COLORS.control;

            return (
                <div 
                    onClick={(e) => {
                        e.stopPropagation(); 
                        onClick(data);
                    }}
                    className={`
                        absolute transform -translate-x-1/2 -translate-y-1/2 
                        w-56 p-4 rounded-xl border-l-4 shadow-lg cursor-pointer transition-all duration-300
                        hover:shadow-2xl hover:-translate-y-1/2 hover:scale-105 z-10 bg-white
                        ${styleClass.replace('bg-', 'border-l-')} 
                        ${isSelected ? 'ring-2 ring-offset-2 ring-indigo-500 scale-105' : ''}
                    `}
                    style={{ left: data.x, top: data.y }}
                >
                    <div className="flex items-center gap-3 mb-2">
                        <div className={`p-2 rounded-lg bg-opacity-10 ${styleClass.split(' ')[0].replace('bg-', 'bg-')}`}>
                            <Icon size={20} className={styleClass.split(' ')[2]} />
                        </div>
                        <span className="font-bold text-[11px] uppercase tracking-wider text-slate-700">{data.label}</span>
                    </div>
                    <p className="text-xs text-slate-500 leading-snug">{data.shortDesc}</p>
                    
                    {data.system && (
                        <div className="absolute -top-3 -right-2 shadow-sm bg-slate-800 text-white text-[10px] font-mono px-2 py-1 rounded-md border border-slate-600">
                            {data.system}
                        </div>
                    )}
                </div>
            );
        };

        const Connection = ({ start, end, label, type }) => {
            const startY = start.y + 50;
            const endY = end.y - 50;
            const midY = (startY + endY) / 2;
            const path = `M ${start.x} ${startY} C ${start.x} ${midY}, ${end.x} ${midY}, ${end.x} ${endY}`;
            
            const strokeColor = type === 'secondary' ? '#cbd5e1' : '#64748b';
            const isSecondary = type === 'secondary';

            return (
                <g>
                    <path d={path} fill="none" stroke={strokeColor} strokeWidth={isSecondary ? "2" : "3"} />
                    
                    {!isSecondary && (
                        <path 
                            d={path} 
                            fill="none" 
                            stroke={type === 'sale' ? '#10b981' : '#3b82f6'} 
                            strokeWidth="2" 
                            strokeDasharray="5,5" 
                            className="animate-flow opacity-60"
                        />
                    )}

                    <path 
                        d={`M ${end.x} ${endY} L ${end.x - 5} ${endY - 10} L ${end.x + 5} ${endY - 10} Z`} 
                        fill={strokeColor} 
                    />

                    {label && (
                        <g>
                            <rect x={(start.x + end.x) / 2 - 45} y={midY - 12} width="90" height="24" rx="12" fill="white" stroke="#e2e8f0" className="shadow-sm"/>
                            <text x={(start.x + end.x) / 2} y={midY + 5} textAnchor="middle" className="text-[10px] fill-slate-600 font-bold uppercase tracking-tight">
                                {label}
                            </text>
                        </g>
                    )}
                </g>
            );
        };

        // --- COMPONENTE: APRESENTAÇÃO COMERCIAL AO CLIENTE ---
        const ClientPresentation = () => {
            return (
                <div className="max-w-6xl mx-auto h-full overflow-y-auto bg-slate-50 font-sans scrollbar-hide pb-20">
                    <div className="bg-white shadow-xl min-h-screen">
                        
                        {/* HERO SECTION */}
                        <div className="bg-slate-900 text-white pt-24 pb-20 px-12 relative overflow-hidden rounded-b-[3rem] shadow-2xl">
                            <div className="relative z-10 max-w-4xl mt-8">
                                <div className="flex items-center gap-3 mb-6">
                                    <span className="bg-amber-500 text-slate-900 px-3 py-1 text-xs font-bold uppercase tracking-widest rounded-sm">
                                        Logística Estratégica Avançada
                                    </span>
                                </div>
                                <h1 className="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight leading-tight">
                                    ESTOQUE EM <span className="text-amber-500">TRÂNSITO</span>
                                </h1>
                                <p className="text-2xl text-slate-300 font-light max-w-3xl leading-relaxed border-l-4 border-amber-500 pl-6">
                                    A evolução do fulfillment: O modelo de "Estoque sobre Rodas".
                                </p>
                            </div>
                            <div className="absolute right-0 top-0 h-full w-1/3 bg-gradient-to-l from-slate-800 to-transparent opacity-50"></div>
                            <div className="absolute -right-10 bottom-0 text-slate-800 opacity-30 transform -rotate-12">
                                <Truck size={450} />
                            </div>
                        </div>

                        {/* 1. CONCEITO */}
                        <div className="px-12 -mt-10 relative z-20 mb-20">
                            <div className="bg-white rounded-2xl shadow-xl p-10 border border-slate-100">
                                <h2 className="text-3xl font-bold text-slate-900 mb-6 flex items-center gap-3">
                                    <Target className="text-amber-500" size={32} /> 1. O Conceito do Modelo
                                </h2>
                                <p className="text-slate-600 mb-8 text-lg">
                                    Esta operação <strong>não caracteriza armazenagem tradicional</strong>. Trata-se de uma infraestrutura estratégica e transitória desenhada para marcas, indústrias e e-commerces:
                                </p>
                                
                                <div className="grid md:grid-cols-3 gap-6 mb-8">
                                    <div className="bg-slate-50 p-6 rounded-xl border border-slate-100 hover:border-blue-200 hover:shadow-md transition-all">
                                        <MapPin className="text-blue-600 mb-4" size={32} />
                                        <p className="text-slate-700 font-medium">A mercadoria é remetida e concentrada na base logística estratégica da UX (SP).</p>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-xl border border-slate-100 hover:border-emerald-200 hover:shadow-md transition-all">
                                        <ShieldCheck className="text-emerald-600 mb-4" size={32} />
                                        <p className="text-slate-700 font-medium">A propriedade dos itens permanece 100% com o cliente até a efetiva venda ao consumidor.</p>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-xl border border-slate-100 hover:border-purple-200 hover:shadow-md transition-all">
                                        <Zap className="text-purple-600 mb-4" size={32} />
                                        <p className="text-slate-700 font-medium">A finalidade exclusiva é acelerar a entrega final (Last Mile) e elevar o nível de serviço.</p>
                                    </div>
                                </div>

                                <div className="bg-blue-50 p-5 rounded-xl border-l-4 border-blue-500 flex gap-4 items-start shadow-sm">
                                    <Info className="text-blue-600 shrink-0 mt-0.5" size={24} />
                                    <p className="text-blue-900 leading-relaxed">
                                        Juridicamente estruturado como <strong>remessa em consignação, depósito fechado ou armazém geral</strong> (conforme perfil do cliente), o modelo oferece segurança jurídica e enorme flexibilidade tributária.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* 2. VANTAGENS FISCAIS */}
                        <div className="px-12 mb-20">
                            <h2 className="text-3xl font-bold text-slate-900 mb-10 text-center">2. Benefícios e Ganhos Fiscais</h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                {/* 2.1 */}
                                <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl transition-shadow relative overflow-hidden group">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-indigo-500 transform origin-left scale-x-0 group-hover:scale-x-100 transition-transform"></div>
                                    <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-6">
                                        <Box size={28} />
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-4">2.1 Preservação de Ativo</h3>
                                    <p className="text-sm text-slate-500 mb-4 font-medium uppercase tracking-wide">Na remessa estratégica:</p>
                                    <ul className="space-y-3 mb-8">
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-indigo-500 shrink-0"/> O estoque permanece contabilmente como ativo da sua empresa.</li>
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-indigo-500 shrink-0"/> Não há faturamento/venda no momento da transferência física.</li>
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-indigo-500 shrink-0"/> A tributação efetiva ocorre exclusivamente no ato da venda final.</li>
                                    </ul>
                                    <div className="p-4 bg-slate-50 rounded-lg mt-auto">
                                        <span className="text-xs font-bold text-slate-800 uppercase block mb-1">Ganhos de Capital:</span>
                                        <p className="text-sm text-slate-600">Preserva o fluxo de caixa, evita antecipação indevida de receita e melhora o giro financeiro.</p>
                                    </div>
                                </div>

                                {/* 2.2 */}
                                <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl transition-shadow relative overflow-hidden group">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500 transform origin-left scale-x-0 group-hover:scale-x-100 transition-transform"></div>
                                    <div className="w-14 h-14 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-6">
                                        <FileText size={28} />
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-4">2.2 Inteligência Tributária</h3>
                                    <p className="text-sm text-slate-500 mb-4 font-medium uppercase tracking-wide">Fluxo fiscal correto:</p>
                                    <ul className="space-y-3 mb-8">
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-blue-500 shrink-0"/> Permite destaque de ICMS conforme a operação de remessa interestadual.</li>
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-blue-500 shrink-0"/> Possibilidade de respeitar e aplicar o regime de ST quando necessário.</li>
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-blue-500 shrink-0"/> Ajuste fiscal limpo no momento da venda real via CFOP específico.</li>
                                    </ul>
                                    <div className="p-4 bg-slate-50 rounded-lg mt-auto">
                                        <span className="text-xs font-bold text-slate-800 uppercase block mb-1">Ganhos Fiscais:</span>
                                        <p className="text-sm text-slate-600">Separa o momento logístico do momento comercial, mitigando bitributação ou bi-imposição.</p>
                                    </div>
                                </div>

                                {/* 2.3 */}
                                <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl transition-shadow relative overflow-hidden group">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-emerald-500 transform origin-left scale-x-0 group-hover:scale-x-100 transition-transform"></div>
                                    <div className="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-6">
                                        <Layers size={28} />
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-4">2.3 Ajustes e Governança</h3>
                                    <p className="text-sm text-slate-500 mb-4 font-medium uppercase tracking-wide">Dependendo do produto:</p>
                                    <ul className="space-y-3 mb-8">
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-emerald-500 shrink-0"/> Parametrização de CFOPs dedicados para operação de trânsito/consignação.</li>
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-emerald-500 shrink-0"/> Tratamento seguro para retorno de mercadoria (logística reversa fiscal).</li>
                                        <li className="flex gap-3 text-sm text-slate-700"><CheckCircle size={18} className="text-emerald-500 shrink-0"/> Rastreabilidade total entre NF de remessa e NFs de venda fracionada.</li>
                                    </ul>
                                    <div className="p-4 bg-slate-50 rounded-lg mt-auto">
                                        <span className="text-xs font-bold text-slate-800 uppercase block mb-1">Controle:</span>
                                        <p className="text-sm text-slate-600">Reversibilidade fiscal organizada. Auditoria e compliance garantidos de ponta a ponta.</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 3. VANTAGENS OPERACIONAIS */}
                        <div className="bg-slate-900 py-24 px-12 text-white">
                            <div className="max-w-5xl mx-auto">
                                <h2 className="text-3xl font-bold mb-4 text-center text-white"><span className="text-amber-500">3.</span> Vantagens Operacionais</h2>
                                <p className="text-center text-slate-400 mb-12 text-lg">Substituindo Capex por Inteligência de Distribuição.</p>

                                        <button 
                                            onClick={(e) => { e.stopPropagation(); setIsSidebarOpen(true); }}
                                            className="absolute top-4 left-4 z-50 bg-white p-3 rounded-full shadow-lg text-slate-600 hover:text-blue-600 hover:scale-110 transition-all border border-slate-200"
                                            title="Abrir Painel de Detalhes"
                                        >
                                            <PanelLeft size={24} />
                                        </button>
                                    )}

                                    <div className="relative min-w-[1400px] min-h-[1000px] mx-auto py-10">
                                        
                                        {/* Título do Fluxograma */}
                                        <div className="absolute top-0 left-0 w-full text-center mt-4 pointer-events-none z-10">
                                            <h2 className="text-2xl font-bold text-slate-400 uppercase tracking-[0.2em]">Topologia da Operação</h2>
                                        </div>
                                        
                                        <div className="absolute inset-0 flex pointer-events-none mx-10 my-10 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                            <div className="w-1/2 border-r border-slate-100 bg-gradient-to-b from-blue-50/50 to-white relative">
                                                <div className="absolute top-6 left-6 flex items-center gap-2 text-blue-300 font-bold text-5xl uppercase tracking-widest opacity-20 select-none">
                                                    INBOUND
                                                </div>
                                            </div>
                                            <div className="w-1/2 bg-gradient-to-b from-emerald-50/50 to-white relative">
                                                <div className="absolute top-6 right-6 flex items-center gap-2 text-emerald-300 font-bold text-5xl uppercase tracking-widest opacity-20 select-none">
                                                    OUTBOUND
                                                </div>
                                            </div>
                                        </div>

                                        <svg className="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
                                            {connections.map((conn, index) => {
                                                const startNode = nodes.find(n => n.id === conn.from);
                                                const endNode = nodes.find(n => n.id === conn.to);
                                                if (!startNode || !endNode) return null;
                                                
                                                const isHighlighted = hoveredNodeId ? highlightData.highlightedConnections.has(`${conn.from}-${conn.to}`) : false;
                                                const isDimmed = hoveredNodeId ? !isHighlighted : false;

                                                return (
                                                    <Connection 
                                                        key={index} 
                                                        start={startNode} 
                                                        end={endNode} 
                                                        label={conn.label}
                                                        type={conn.type}
                                                        isHighlighted={isHighlighted}
                                                        isDimmed={isDimmed}
                                                    />
                                                );
                                            })}
                                            
                                            <path 
                                                d="M 700 850 C 100 850, 100 150, 370 150" 
                                                fill="none" 
                                                stroke="#a855f7" 
                                                strokeWidth="2" 
                                                strokeDasharray="8,8"
                                                className="opacity-30"
                                            />
                                            <text x="180" y="500" className="text-[10px] fill-purple-500 font-bold -rotate-90 tracking-widest">LOOP DE REPOSIÇÃO</text>
                                        </svg>

                                        {nodes.map(node => (
                                            <Node 
                                                key={node.id} 
                                                data={node} 
                                                onClick={setSelectedNode}
                                                onHover={setHoveredNodeId}
                                                onLeave={() => setHoveredNodeId(null)}
                                                isSelected={selectedNode?.id === node.id}
                                                isDimmed={hoveredNodeId && !highlightData.highlightedNodes.has(node.id)}
                                            />
                                        ))}
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
